services:
  # PostgreSQL: multi-user session/account store (replaces the single-user
  # SQLite + per-session files). Bundled so the app runs the same locally and
  # when hosted.
  db:
    # See mimicc-server's platform comment below.
    platform: ${MIMICC_PLATFORM:-linux/arm64}
    image: postgres:16
    container_name: mimicc-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mimicc}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mimicc}
      - POSTGRES_DB=${POSTGRES_DB:-mimicc}
    volumes:
      - mimicc-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mimicc}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # Per-user Webin credentials cache (see server/credentials_store.py), only
  # needed for multi-worker hosted deployments (set REDIS_URL to use it).
  # Persistence is disabled so credentials are never written to disk, matching
  # the original in-process-only design intent; a TTL is the backstop.
  redis:
    image: redis:7-alpine
    container_name: mimicc-redis
    command: redis-server --save "" --appendonly no
    restart: unless-stopped

  mimicc-server:
    # Pinned so this project builds natively (no QEMU emulation) even when
    # DOCKER_DEFAULT_PLATFORM=linux/amd64 is set globally for other projects.
    # Override (or remove) if you're on an amd64 host.
    platform: ${MIMICC_PLATFORM:-linux/arm64}
    build:
      context: .
      dockerfile: Dockerfile
      # DataHarmonizer/dh-builder sources are pulled inside the Dockerfile
      # itself at pinned tags (see its DATAHARMONIZER_REF/DH_BUILDER_REF
      # build args) — no local sibling checkout or additional_contexts
      # needed. The MIMICC schemas + ENA XSDs are committed directly in
      # this repo (schemas/, assets/ena_schema/).
    container_name: mimicc-ena-submission-assistant
    depends_on:
      db:
        condition: service_healthy
    # In hosted deployments put this behind a TLS-terminating reverse proxy and
    # change the binding to expose it; bound to loopback by default for local use.
    ports:
      - "127.0.0.1:${MIMICC_PORT:-9000}:9000"
    volumes:
      # NB: the app doesn't mount the host Docker socket, the whole host
      # (/hostroot) or a reads workspace — reads upload happens on the user's
      # machine via the read-helper, and sessions live in Postgres.
      #
      # Built DataHarmonizer bundle, served at /dh. Bind-mounted (rather than
      # baked into the image) so it can be updated in place; seeded from the
      # image's build-time bundle on first run (scripts/server_entrypoint.sh).
      - ${MIMICC_DH_BUNDLE_DIR:-mimicc-dh-bundle}:/app/server/static/dh
      # Schema library: saved/imported LinkML schemas backing the grids.
      - ${MIMICC_SCHEMAS_DIR:-mimicc-schemas}:/schemas
    environment:
      # Deployment mode: "local" auto-logs-in as admin (no login screen);
      # "hosted" enforces the login + cookie auth + CSRF guard.
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-local}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mimicc}:${POSTGRES_PASSWORD:-mimicc}@db:5432/${POSTGRES_DB:-mimicc}
      # Admin account, created/updated from these on every boot (env is
      # authoritative for the admin password).
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-mimicc-ena-insecure-dev-key}
      # Extra cross-origin browser origins allowed to call the API (the SPA is
      # same-origin, so usually empty). Comma-separated.
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      # Loopback port the browser expects the local read-helper on.
      - HELPER_PORT=${HELPER_PORT:-9100}
      - SCHEMAS_CONTAINER_DIR=/schemas
      # Per-user Webin credentials cache (see server/credentials_store.py).
      # Unset in local/single-process use: falls back to in-process LocMemCache.
      - REDIS_URL=${REDIS_URL:-}
      # Browser-reachable URL of the dhtb sidecar (the browser talks to it
      # directly, not through this container) — see /api/health: dhtb_url.
      - DHTB_URL=http://localhost:${MIMICC_DHTB_PORT:-8765}
    restart: unless-stopped

  # Local reads upload helper. Only started for fully-local single-user use
  # (profile "local"); in a hosted deployment each user runs the helper on their
  # own workstation instead (see https://github.com/timrozday-mgnify/read-helper).
  # Start it locally with:
  #   COMPOSE_PROFILES=local docker compose up -d --build
  read-helper:
    profiles: ["local"]
    # See mimicc-server's platform comment above.
    platform: ${MIMICC_PLATFORM:-linux/arm64}
    build:
      # Pinned tag — see README "Pinned dependency versions" for how to bump it.
      context: https://github.com/timrozday-mgnify/read-helper.git#v0.1.0
    container_name: mimicc-read-helper
    ports:
      - "127.0.0.1:${HELPER_PORT:-9100}:9100"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/hostroot
    environment:
      - HELPER_PORT=${HELPER_PORT:-9100}
      - HOST_HOME=${HOME}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    restart: unless-stopped

  # DataHarmonizer Template Builder: edit/preview LinkML schemas before
  # selecting them via /api/schemas/select. Sibling service the main app
  # embeds as an iframe (postMessage bridge); see server/static/app.js.
  dhtb:
    # See mimicc-server's platform comment above.
    platform: ${MIMICC_PLATFORM:-linux/arm64}
    build:
      # Pinned tags — see README "Pinned dependency versions" for how to bump these.
      context: https://github.com/timrozday-mgnify/dataharmonizer-template-builder.git#v0.1.0
      additional_contexts:
        dataharmonizer-src: https://github.com/timrozday-mgnify/DataHarmonizer.git#v2.1.0-mimicc
        linkml-lib: https://github.com/timrozday-mgnify/linkml-lib.git#v0.1.0
        dh-builder-lib: https://github.com/timrozday-mgnify/dh-builder.git#v0.1.0
    container_name: mimicc-dhtb
    ports:
      - "127.0.0.1:${MIMICC_DHTB_PORT:-8765}:8765"
    environment:
      - DHTB_FRONTEND_CONFIG_JSON={"hostMode":"embedded","hostName":"MIMICC ENA Submission Assistant","showImportButton":false,"showExportButton":false,"showGenerateButton":true,"showPreviewButton":true,"allowExampleSchema":false}
    restart: unless-stopped

volumes:
  mimicc-db-data:
  mimicc-dh-bundle:
  mimicc-schemas:
