  LibraryStrategyMenu:
    name: LibraryStrategyMenu
    permissible_values:
      WGS:
        text: WGS
        description: Whole Genome Sequencing - random sequencing of the whole genome (see pubmed 10731132 for details)
      WGA:
        text: WGA
        description: Whole Genome Amplification followed by random sequencing. (see pubmed 1631067,8962113 for details)
      WXS:
        text: WXS
        description: Random sequencing of exonic regions selected from the genome. (see pubmed 20111037 for details)
      RNA-Seq:
        text: RNA-Seq
        description: Random sequencing of whole transcriptome, also known as Whole Transcriptome Shotgun Sequencing, or WTSS).
          (see pubmed 18611170 for details)
      ssRNA-seq:
        text: ssRNA-seq
        description: Strand-specific RNA sequencing.
      snRNA-seq:
        text: snRNA-seq
        description: Single nucleus RNA sequencing is a method for profiling gene expression in cells which are difficult
          to isolate.
      miRNA-Seq:
        text: miRNA-Seq
        description: Micro RNA sequencing strategy designed to capture post-transcriptional RNA elements and include non-coding
          functional elements. (see pubmed 21787409 for details)
      ncRNA-Seq:
        text: ncRNA-Seq
        description: Capture of other non-coding RNA types, including post-translation modification types such as snRNA (small
          nuclear RNA) or snoRNA (small nucleolar RNA), or expression regulation types such as siRNA (small interfering RNA)
          or piRNA/piwi/RNA (piwi-interacting RNA).
      FL-cDNA:
        text: FL-cDNA
        description: Full-length sequencing of cDNA templates
      EST:
        text: EST
        description: Single pass sequencing of cDNA templates
      Hi-C:
        text: Hi-C
        description: Chromosome Conformation Capture technique where a biotin-labeled nucleotide is incorporated at the ligation
          junction, enabling selective purification of chimeric DNA ligation junctions followed by deep sequencing.
      ATAC-seq:
        text: ATAC-seq
        description: Assay for Transposase-Accessible Chromatin (ATAC) strategy is used to study genome-wide chromatin accessibility.
          alternative method to DNase-seq that uses an engineered Tn5 transposase to cleave DNA and to integrate primer DNA
          sequences into the cleaved genomic DNA.
      WCS:
        text: WCS
        description: Random sequencing of a whole chromosome or other replicon isolated from a genome.
      RAD-Seq:
        text: RAD-Seq
        description: Restriction site associated DNA marker.
      CLONE:
        text: CLONE
        description: Genomic clone based (hierarchical) sequencing.
      POOLCLONE:
        text: POOLCLONE
        description: Shotgun of pooled clones (usually BACs and Fosmids).
      AMPLICON:
        text: AMPLICON
        description: Sequencing of overlapping or distinct PCR or RT-PCR products. For example, metagenomic community profiling
          using SSU rRNA .
      CLONEEND:
        text: CLONEEND
        description: Clone end (5', 3', or both) sequencing.
      FINISHING:
        text: FINISHING
        description: Sequencing intended to finish (close) gaps in existing coverage.
      ChIP-Seq:
        text: ChIP-Seq
        description: ChIP-seq, Chromatin ImmunoPrecipitation, reveals binding sites of specific proteins, typically transcription
          factors (TFs) using antibodies to extract DNA fragments bound to the target protein.
      MNase-Seq:
        text: MNase-Seq
        description: Identifies well-positioned nucleosomes. uses Micrococcal Nuclease (MNase) is an endo-exonuclease that
          processively digests DNA until an obstruction, such as a nucleosome, is reached.
      DNase-Hypersensitivity:
        text: DNase-Hypersensitivity
        description: Sequencing of hypersensitive sites, or segments of open chromatin that are more readily cleaved by DNaseI.
      Bisulfite-Seq:
        text: Bisulfite-Seq
        description: MethylC-seq. Sequencing following treatment of DNA with bisulfite to convert cytosine residues to uracil
          depending on methylation status.
      CTS:
        text: CTS
        description: Concatenated Tag Sequencing
      MRE-Seq:
        text: MRE-Seq
        description: Methylation-Sensitive Restriction Enzyme Sequencing.
      MeDIP-Seq:
        text: MeDIP-Seq
        description: Methylated DNA Immunoprecipitation Sequencing.
      MBD-Seq:
        text: MBD-Seq
        description: Methyl CpG Binding Domain Sequencing.
      Tn-Seq:
        text: Tn-Seq
        description: Quantitatively determine fitness of bacterial genes based on how many times a purposely seeded transposon
          gets inserted into each gene of a colony after some time.
      VALIDATION:
        text: VALIDATION
        description: 'CGHub special request: Independent experiment to re-evaluate putative variants.'
      FAIRE-seq:
        text: FAIRE-seq
        description: Formaldehyde Assisted Isolation of Regulatory Elements. Reveals regions of open chromatin.
      SELEX:
        text: SELEX
        description: Systematic Evolution of Ligands by Exponential enrichment
      RIP-Seq:
        text: RIP-Seq
        description: Direct sequencing of RNA immunoprecipitates (includes CLIP-Seq, HITS-CLIP and PAR-CLIP).
      ChIA-PET:
        text: ChIA-PET
        description: Direct sequencing of proximity-ligated chromatin immunoprecipitates.
      Synthetic-Long-Read:
        text: Synthetic-Long-Read
        description: binning and barcoding of large DNA fragments to facilitate assembly of the fragment
      Targeted-Capture:
        text: Targeted-Capture
        description: Enrichment of a targeted subset of loci.
      Tethered Chromatin Conformation Capture:
        text: Tethered Chromatin Conformation Capture
        description: Tethered Chromatin Conformation Capture.
      NOMe-Seq:
        text: NOMe-Seq
        description: Nucleosome Occupancy and Methylome sequencing.
      ChM-Seq:
        text: ChM-Seq
        description: ChIPmentation combines chromatin immunoprecipitation with sequencing library preparation by Tn5 transposase
          (see pubmed 26280331 for details)
      GBS:
        text: GBS
        description: Genotyping by sequencing is a method to discover single nucleotide polymorphisms for genotyping studies.
      Ribo-Seq:
        text: Ribo-Seq
        description: Ribosome profiling (also named ribosome footprinting) that uses specialized messenger RNA (mRNA) sequencing
          to determine which mRNAs are being actively translated. It produces a "global snapshot" of all the ribosomes active
          in a cell at a particular moment, known as a translatome.
      OTHER:
        text: OTHER
        description: Library strategy not listed.
