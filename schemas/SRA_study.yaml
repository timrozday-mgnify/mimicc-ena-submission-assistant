id: https://github.com/timrozday/ena-submission-dataharmonizer/SRA_study
name: SRA_study
title: Study
description: A Study is a container for a sequencing investigation that may comprise multiple experiments. The Study has an
  overall goal, but is otherwise minimally defined in the SRA. A Study is composed of a descriptor, zero or more experiments,
  and zero or more analyses. The submitter may decorate the Study with web links and properties.
version: 1.0.0
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  ENA: https://www.ebi.ac.uk/ena/browser/view/
default_range: string
classes:
  dh_interface:
    name: dh_interface
    description: A DataHarmonizer interface
    from_schema: https://github.com/timrozday/ena-submission-dataharmonizer/SRA_study
  SRA_study:
    name: SRA_study
    title: Study
    description: A Study is a container for a sequencing investigation that may comprise multiple experiments. The Study has
      an overall goal, but is otherwise minimally defined in the SRA. A Study is composed of a descriptor, zero or more experiments,
      and zero or more analyses. The submitter may decorate the Study with web links and properties.
    is_a: dh_interface
    slots:
    - IS_PRIMARY
    - STUDY_TITLE
    - existing_study_type
    - new_study_type
    - STUDY_ABSTRACT
    - CENTER_NAME
    - CENTER_PROJECT_NAME
    - PROJECT_ID
    - STUDY_DESCRIPTION
    slot_usage:
      IS_PRIMARY:
        rank: 1
      STUDY_TITLE:
        rank: 2
      existing_study_type:
        rank: 3
      new_study_type:
        rank: 4
      STUDY_ABSTRACT:
        rank: 5
      CENTER_NAME:
        rank: 6
      CENTER_PROJECT_NAME:
        rank: 7
      PROJECT_ID:
        rank: 8
      STUDY_DESCRIPTION:
        rank: 9
slots:
  IS_PRIMARY:
    name: IS_PRIMARY
    description: Whether this study object is designated as the primary source of the study or project information.
    range: boolean
    required: true
  STUDY_TITLE:
    name: STUDY_TITLE
    description: Title of the study as would be used in a publication.
    range: string
    required: true
  existing_study_type:
    name: existing_study_type
    description: The existing_study_type field.
    range: ExistingStudyTypeMenu
    required: true
  new_study_type:
    name: new_study_type
    description: To propose a new term, select Other and enter a new study type.
    range: string
  STUDY_ABSTRACT:
    name: STUDY_ABSTRACT
    description: Briefly describes the goals, purpose, and scope of the Study. This need not be listed if it can be inherited
      from a referenced publication.
    range: string
  CENTER_NAME:
    name: CENTER_NAME
    description: DEPRECATED. Use STUDY@center_name instead. Controlled vocabulary identifying the sequencing center, core
      facility, consortium, or laboratory responsible for the study.
    range: string
  CENTER_PROJECT_NAME:
    name: CENTER_PROJECT_NAME
    description: Submitter defined project name. This field is intended for backward tracking of the study record to the submitter's
      LIMS.
    range: string
  PROJECT_ID:
    name: PROJECT_ID
    description: DEPRECATED (use RELATED_STUDIES.STUDY instead). The required PROJECT_ID accession is generated by the Genome
      Project database at NCBI and will be valid also at the other archival institutions.
    range: integer
  STUDY_DESCRIPTION:
    name: STUDY_DESCRIPTION
    description: More extensive free-form description of the study.
    range: string
enums:
  ExistingStudyTypeMenu:
    name: ExistingStudyTypeMenu
    description: ''
    permissible_values:
      Whole Genome Sequencing:
        text: Whole Genome Sequencing
        description: Sequencing of a single organism.
      Metagenomics:
        text: Metagenomics
        description: Sequencing of a community.
      Transcriptome Analysis:
        text: Transcriptome Analysis
        description: Sequencing and characterization of transcription elements.
      Resequencing:
        text: Resequencing
        description: Sequencing of a sample with respect to a reference.
      Epigenetics:
        text: Epigenetics
        description: Cellular differentiation study.
      Synthetic Genomics:
        text: Synthetic Genomics
        description: Sequencing of modified, synthetic, or transplanted genomes.
      Forensic or Paleo-genomics:
        text: Forensic or Paleo-genomics
        description: Sequencing of recovered genomic material.
      Gene Regulation Study:
        text: Gene Regulation Study
        description: Study of gene expression regulation.
      Cancer Genomics:
        text: Cancer Genomics
        description: Study of cancer genomics.
      Population Genomics:
        text: Population Genomics
        description: Study of populations and evolution through genomics.
      RNASeq:
        text: RNASeq
        description: RNA sequencing study.
      Exome Sequencing:
        text: Exome Sequencing
        description: The study investigates the exons of the genome.
      Pooled Clone Sequencing:
        text: Pooled Clone Sequencing
        description: The study is sequencing clone pools (BACs, fosmids, other constructs).
      Transcriptome Sequencing:
        text: Transcriptome Sequencing
        description: Sequencing of transcription elements.
      Other:
        text: Other
        description: Study type not listed.
