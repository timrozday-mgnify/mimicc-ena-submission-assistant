slots:
  alias:
    annotations:
      id: alias
      source: ENA.sample
    title: Sample alias (ENA sample alias)
    description: Unique alias for the sample within this submission account. Used as
      a cross-reference key in experiment and run objects. Auto-generated as
      {project_name}_{fermenter_run_id}_{fermenter_tank}_{time_from_inoculation_h}
      (e.g. MIMICC_Run1_A_48).
    range: string
    required: true
    recommended: true
    ifabsent: 'formula(=CONCATENATE({project_name}, "_", {fermenter_run_id}, "_", {fermenter_tank}, "_", {time_from_inoculation_h}))'
  SAMPLE_TITLE:
    annotations:
      id: SAMPLE_TITLE
      source: ENA.sample
    title: Sample title
    description: Short human-readable title for the sample. Auto-generated as
      {project_name}_{fermenter_run_id}_{fermenter_tank}_{time_from_inoculation_h}
      (e.g. MIMICC_Run1_A_48).
    range: string
    required: true
    recommended: true
    ifabsent: 'formula(=CONCATENATE({project_name}, "_", {fermenter_run_id}, "_", {fermenter_tank}, "_", {time_from_inoculation_h}))'
  TAXON_ID:
    annotations:
      id: TAXON_ID
      source: ENA.project
    title: Taxon ID
    description: NCBI taxonomy identifier for the sample organism.
    range: integer
    required: true
    ifabsent: int(1235509)
    comments:
    - Default 1235509 = synthetic metagenome (for SynCom samples). Use species-level
      taxid for isolate WGS.
  SCIENTIFIC_NAME:
    annotations:
      id: SCIENTIFIC_NAME
      source: ENA.project
    title: Scientific name
    description: Scientific name matching TAXON_ID exactly.
    range: string
    required: true
    ifabsent: string(synthetic metagenome)
    comments:
    - Default pairs with taxid 1235509. Switch to species-level name for isolate WGS.
  COMMON_NAME:
    annotations:
      id: COMMON_NAME
      source: ENA.project
    title: Common name
    description: Common name for the organism. Usually omitted for metagenomes.
    range: string
  STRAIN:
    annotations:
      id: STRAIN
      source: ENA.project
    title: Strain
    description: Strain identifier. Use only when sequencing a single isolate.
    range: string
  ISOLATE:
    annotations:
      id: ISOLATE
      source: ENA.project
    title: Isolate
    description: Isolate label. Use only when sequencing a single isolate.
    range: string
  sample_collection_device:
    annotations:
      id: sample collection device
      source: ERC000025
    title: Sample collection device
    description: The device used to collect an environmental sample. It is recommended
      to use terms listed under environmental sampling device (http://purl.obolibrary.org/obo/ENVO)
      and/or terms listed under specimen collection device (http://purl.obolibrary.org/obo/GENEPIO_0002094).
    range: string
    required: true
    ifabsent: string(sterile pipette tip)
  sample_collection_method:
    annotations:
      id: sample collection method
      source: ERC000025
    title: Sample collection method
    description: The method employed for collecting the sample. Can be provided in
      the form of a PMID, DOI, url or text.
    range: string
    required: true
    recommended: true
    ifabsent: string(aseptic withdrawal from bioreactor sampling port)
  sample_storage_temperature:
    annotations:
      id: sample storage temperature
      source: ERC000025
    title: Sample storage temperature
    description: temperature at which sample was stored, e.g. -80
    range: string
    ifabsent: string(-80)
    pattern: '[+-]?(0|((0\.)|([1-9][0-9]*\.?))[0-9]*)([Ee][+-]?[0-9]+)?'
    comments:
    - 'Allowed units: °C'
  sample_storage_location:
    annotations:
      id: sample storage location
      source: ERC000025
    title: Sample storage location
    description: Location at which sample was stored, usually name of a specific freezer/room.
      Indicate the location name.
    range: string
    ifabsent: 'string(CAU Kiel -80 freezer)'
  amount_or_size_of_sample_collected:
    annotations:
      id: amount or size of sample collected
      source: ERC000025
    title: Amount or size of sample collected
    description: The total amount or size (volume (ml), mass (g) or area (m2)) of
      sample collected.
    range: string
    ifabsent: string(1 mL)
    pattern: (0|((0\.)|([1-9][0-9]*\.?))[0-9]*)([Ee][+-]?[0-9]+)?
    comments:
    - 'Allowed units: m2'
    - m3
    - g
    - L
    - kg
  collection_date:
    annotations:
      id: collection date
      source: ERC000025
    title: Collection date
    description: 'The date the sample was collected with the intention of sequencing,
      either as an instance (single point in time) or interval. In case no exact time
      is available, the date/time can be right truncated i.e. all of these are valid
      ISO8601 compliant times: 2008-01-23T19:23:10+00:00; 2008-01-23T19:23:10; 2008-01-23;
      2008-01; 2008.'
    range: date
    required: true
    recommended: true
    pattern: '(^[12][0-9]{3}(-(0[1-9]|1[0-2])(-(0[1-9]|[12][0-9]|3[01])(T[0-9]{2}:[0-9]{2}(:[0-9]{2})?Z?([+-][0-9]{1,2})?)?)?)?(/[0-9]{4}(-[0-9]{2}(-[0-9]{2}(T[0-9]{2}:[0-9]{2}(:[0-9]{2})?Z?([+-][0-9]{1,2})?)?)?)?)?$)|(^not
      applicable$)|(^not collected$)|(^not provided$)|(^restricted access$)|(^missing:
      control sample$)|(^missing: sample group$)|(^missing: synthetic construct$)|(^missing:
      lab stock$)|(^missing: third party data$)|(^missing: data agreement established
      pre-2023$)|(^missing: endangered species$)|(^missing: human-identifiable$)|(^missing$)'
  geographic_location_country_andor_sea:
    annotations:
      id: geographic location (country and/or sea)
      source: ERC000025
    title: Geographic location (country and/or sea)
    description: The geographical origin of where the sample was collected from, with
      the intention of sequencing, as defined by the country or sea name. Country
      or sea names should be chosen from the INSDC country list (http://insdc.org/country.html).
    range: GeographicLocationCountryAndorSeaMenu
    required: true
    ifabsent: string(Germany)
  geographic_location_latitude:
    annotations:
      id: geographic location (latitude)
      source: ERC000025
    title: Geographic location (latitude)
    description: The geographical origin of the sample as defined by latitude. The
      values should be reported in decimal degrees and in WGS84 system
    range: string
    required: true
    ifabsent: string(54.3324)
    pattern: '(^[+-]?[0-9]+.?[0-9]{0,8}$)|(^not applicable$)|(^not collected$)|(^not
      provided$)|(^restricted access$)|(^missing: control sample$)|(^missing: sample
      group$)|(^missing: synthetic construct$)|(^missing: lab stock$)|(^missing: third
      party data$)|(^missing: data agreement established pre-2023$)|(^missing: endangered
      species$)|(^missing: human-identifiable$)|(^missing$)'
    comments:
    - 'Allowed units: DD'
  geographic_location_longitude:
    annotations:
      id: geographic location (longitude)
      source: ERC000025
    title: Geographic location (longitude)
    description: The geographical origin of the sample as defined by longitude. The
      values should be reported in decimal degrees and in WGS84 system
    range: string
    required: true
    ifabsent: string(10.1212)
    pattern: '(^[+-]?[0-9]+.?[0-9]{0,8}$)|(^not applicable$)|(^not collected$)|(^not
      provided$)|(^restricted access$)|(^missing: control sample$)|(^missing: sample
      group$)|(^missing: synthetic construct$)|(^missing: lab stock$)|(^missing: third
      party data$)|(^missing: data agreement established pre-2023$)|(^missing: endangered
      species$)|(^missing: human-identifiable$)|(^missing$)'
    comments:
    - 'Allowed units: DD'
  geographic_location_region_and_locality:
    annotations:
      id: geographic location (region and locality)
      source: ERC000025
    title: Geographic location (region and locality)
    description: The geographical origin of the sample as defined by the specific
      region name followed by the locality name.
    range: string
    ifabsent: 'string(Kiel, Schleswig-Holstein, Germany)'
  broadscale_environmental_context:
    annotations:
      id: broad-scale environmental context
      source: ERC000025
    title: Broad-scale environmental context
    description: 'Report the major environmental system the sample or specimen came
      from. The system(s) identified should have a coarse spatial grain, to provide
      the general environmental context of where the sampling was done (e.g. in the
      desert or a rainforest). We recommend using subclasses of EnvO biome class:
      http://purl.obolibrary.org/obo/ENVO_00000428.'
    range: string
    required: true
    ifabsent: 'string(laboratory environment [ENVO:01001384])'
  local_environmental_context:
    annotations:
      id: local environmental context
      source: ERC000025
    title: Local environmental context
    description: Report the entity or entities which are in the sample or specimen's
      local vicinity and which you believe have significant causal influences on your
      sample or specimen. We recommend using EnvO terms which are of smaller spatial
      grain than your entry for broad-scale environmental context.
    range: string
    required: true
    ifabsent: 'string(bioreactor [ENVO:03501336])'
  environmental_medium:
    annotations:
      id: environmental medium
      source: ERC000025
    title: Environmental medium
    description: Report the environmental material(s) immediately surrounding the
      sample or specimen at the time of sampling. We recommend using subclasses of
      environmental material (http://purl.obolibrary.org/obo/ENVO_00010483). For
      MIMICC continuous culture samples, this is modified Gifu Anaerobic Medium Broth
      (mGAM; Nissui Pharmaceutical); add a DOI or URL when the protocol paper is published.
    range: string
    required: true
    recommended: true
    ifabsent: 'string(modified Gifu Anaerobic Medium Broth (mGAM) [doi.org/10.1038/s41564-018-0123-9])'
  project_name:
    annotations:
      id: project name
      source: ERC000025
    title: Project name
    description: Name of the project within which the sequencing was organized
    range: string
    required: true
    ifabsent: string(MIMICC)
  temperature:
    annotations:
      id: temperature
      source: ERC000025
    title: Temperature
    description: Temperature of the culture at the time of sampling. MIMICC baseline
      is 37 ºC (continuously controlled). Temperature perturbation experiments use
      ±2 ºC shifts (35 ºC or 39 ºC).
    range: string
    required: true
    recommended: true
    pattern: '[+-]?(0|((0\.)|([1-9][0-9]*\.?))[0-9]*)([Ee][+-]?[0-9]+)?'
    comments:
    - 'Allowed units: ºC'
    ifabsent: string(37)
  ph:
    annotations:
      id: pH
      source: ERC000025
    title: pH
    description: pH of the culture medium at sampling. MIMICC baseline is 7.3 (continuously
      monitored). pH may drift slightly during culture; pH perturbation experiments
      use pH shifts as the independent variable.
    range: string
    required: true
    recommended: true
    pattern: (0|((0\.)|([1-9][0-9]*\.?))[0-9]*)([Ee][+-]?[0-9]+)?
    ifabsent: string(7.3)
  source_material_identifiers:
    annotations:
      id: source material identifiers
      source: ERC000025
    title: Sample name (Source material identifiers)
    description: A unique identifier assigned to a material sample (as defined by
      http://rs.tdwg.org/dwc/terms/materialSampleID) used for extracting nucleic acids,
      and subsequent sequencing. The identifier can refer either to the original material
      collected or to any derived sub-samples. For MIMICC, must be unique per sample.
      Auto-generated as {project_name}_{fermenter_run_id}_{fermenter_tank}_{time_from_inoculation_h}
      (e.g. MIMICC_Run1_A_48).
    range: string
    required: true
    recommended: true
    ifabsent: 'formula(=CONCATENATE({project_name}, "_", {fermenter_run_id}, "_", {fermenter_tank}, "_", {time_from_inoculation_h}))'
  isolation_and_growth_condition:
    annotations:
      id: isolation and growth condition
      source: ERC000025
    title: Isolation and growth condition
    description: Publication reference in the form of pubmed ID (pmid), digital object
      identifier (doi) or url for isolation and growth condition specifications of
      the organism/material. Mandatory for MIGS and MIMARKS Specimen. For MIMICC,
      this field may be left empty if the continuous culture protocol is not yet published;
      add a DOI or URL when the protocol paper becomes available.
    range: string
    required: true
    recommended: true
    ifabsent: 'string(DOI TBD)'
  sample_material_processing:
    annotations:
      id: sample material processing
      source: ERC000025
    title: Sample material processing
    description: A brief description of any processing applied to the sample during
      or after retrieving the sample from environment, or a link to the relevant protocol(s)
      performed.
    range: string
    recommended: true
    ifabsent: 'string(centrifuged; pellet flash-frozen)'
  sample_volume_or_weight_for_dna_extraction:
    annotations:
      id: sample volume or weight for DNA extraction
      source: ERC000025
      mimicc_default_unit: mg
    title: Sample volume or weight for DNA extraction
    description: 'Volume (ml) or mass (g) of total collected sample processed for
      DNA extraction. Note: total sample collected should be entered under the term
      sample size.'
    range: string
    recommended: true
    ifabsent: string(200)
    pattern: (0|((0\.)|([1-9][0-9]*\.?))[0-9]*)([Ee][+-]?[0-9]+)?
    comments:
    - 'Allowed units: g'
    - ng
    - mg
    - mL
  nucleic_acid_extraction:
    annotations:
      id: nucleic acid extraction
      source: ERC000025
    title: Nucleic acid extraction
    description: A link to a literature reference, electronic resource or a standard
      operating procedure (SOP), that describes the material separation to recover
      the nucleic acid fraction from a sample
    range: string
    required: true
    recommended: true
    ifabsent: 'string(protocol DOI TBD)'
  nucleic_acid_amplification:
    annotations:
      id: nucleic acid amplification
      source: ERC000025
    title: Nucleic acid amplification
    description: A link to a literature reference, electronic resource or a standard
      operating procedure (SOP), that describes the enzymatic amplification (PCR,
      TMA, NASBA) of specific nucleic acids (e.g. V4 16S rRNA PCR (Illumina),
      full-length 16S (ONT))
    range: string
    required: true
    recommended: true
    ifabsent: 'string(V3-V4 16S rRNA PCR (Illumina))'
  library_size:
    annotations:
      id: library size
      source: ERC000025
    title: Library size
    description: Total number of clones in the library prepared for the project
    range: string
    ifabsent: string(not applicable)
  library_construction_method:
    annotations:
      id: library construction method
      source: ERC000025
    title: Library construction method
    description: Library construction method used for clone libraries (e.g. Illumina
      Nextera XT (short-read) or ONT ligation kit SQK-LSK114 (long-read))
    range: string
    recommended: true
    ifabsent: 'string(Illumina Nextera XT)'
  pcr_conditions:
    annotations:
      id: pcr conditions
      source: ERC000025
    title: PCR conditions
    description: Description of reaction conditions and components for PCR in the
      form of 'initial denaturation:94degC_1.5min; annealing=...'
    range: string
    recommended: true
    ifabsent: 'string(standard 16S protocol (cite DOI))'
  pcr_primers:
    annotations:
      id: pcr primers
      source: ERC000025
    title: PCR primers
    description: PCR primers that were used to amplify the sequence of the targeted
      gene, locus or subfragment. This field should contain all the primers used for
      a single PCR reaction if multiple forward or reverse primers are present in a
      single PCR reaction. The primer sequence should be reported in uppercase letters
      (e.g. V3-V4 341F/805R (short-read); 27F/1492R (ONT long-read))
    range: string
    recommended: true
    ifabsent: 'string(V3-V4: 341F/805R)'
  adapters:
    annotations:
      id: adapters
      source: ERC000025
    title: Adapters
    description: Adapters provide priming sequences for both amplification and sequencing
      of the sample-library fragments. Both adapters should be reported; in uppercase
      letters (e.g. Illumina Nextera adapters or ONT barcode adapters)
    range: string
    recommended: true
    ifabsent: 'string(Illumina Nextera adapters)'
  TITLE:
    annotations:
      id: TITLE
      source: SRA.experiment
    title: Reads name (SRA Experiment Title)
    description: Short text that can be used to call out experiment records in searches
      or in displays. This element is technically optional but should be used for
      all new records. Auto-generated as "{project_name} {fermenter_run_id} sample
      {fermenter_tank} {time_from_inoculation_h}h" (e.g. MIMICC Run1 sample A 48h).
    range: string
    recommended: true
    ifabsent: 'formula(=CONCATENATE({project_name}, " ", {fermenter_run_id}, " sample ", {fermenter_tank}, " ", {time_from_inoculation_h}, "h"))'
  STUDY_REF:
    annotations:
      id: STUDY_REF
      source: SRA.experiment
    title: Study reference
    description: Identifies the parent study. Enter the ENA study accession (e.g.
      PRJEB12345).
    range: string
    required: true
    recommended: true
  DESIGN_DESCRIPTION:
    annotations:
      id: DESIGN_DESCRIPTION
      source: SRA.experiment
    title: Design description
    description: Goal and setup of the individual library including how the library
      was constructed.
    range: string
    required: true
    ifabsent: 'string(Continuous culture longitudinal metabarcoding of 20HM SynCom)'
  CENTER_NAME:
    annotations:
      id: CENTER_NAME
      source: SRA.study
    title: Center name
    description: Controlled vocabulary identifying the sequencing center, core facility,
      consortium, or laboratory responsible for the study.
    range: string
    required: true
    ifabsent: string(EMBL-EBI)
  LIBRARY_NAME:
    annotations:
      id: LIBRARY_NAME
      source: SRA.experiment
    title: Sequencing ID (Library name)
    description: The submitter's name for this library. Must be unique per library.
      Auto-generated as {project_name}_{fermenter_run_id}_{fermenter_tank}_{time_from_inoculation_h}_{locus_name}
      (e.g. MIMICC_Run1_A_48_16S rRNA).
    ifabsent: 'formula(=CONCATENATE({project_name}, "_", {fermenter_run_id}, "_", {fermenter_tank}, "_", {time_from_inoculation_h}, "_", {locus_name}))'
    range: string
    required: true
    recommended: true
  LIBRARY_STRATEGY:
    annotations:
      id: LIBRARY_STRATEGY
      source: SRA.experiment
    title: Library strategy
    description: Sequencing technique intended for this library.
    range: LibraryStrategyMenu
    required: true
    ifabsent: string(AMPLICON)
  LIBRARY_SOURCE:
    annotations:
      id: LIBRARY_SOURCE
      source: SRA.experiment
    title: Library source
    description: The type of source material that is being sequenced.
    range: LibrarySourceMenu
    required: true
    ifabsent: string(METAGENOMIC)
  LIBRARY_SELECTION:
    annotations:
      id: LIBRARY_SELECTION
      source: SRA.experiment
    title: Library selection
    description: Method used to enrich the target in the sequence library preparation.
    range: LibrarySelectionMenu
    required: true
    ifabsent: string(PCR)
  LIBRARY_LAYOUT:
    annotations:
      id: LIBRARY_LAYOUT
      source: SRA.experiment
    title: Library layout
    description: LIBRARY_LAYOUT specifies whether to expect single, paired, or other
      configuration of reads. In the case of paired reads, information about the relative
      distance and orientation is specified.
    range: LibraryLayoutMenu
    required: true
    ifabsent: string(PAIRED)
  NOMINAL_LENGTH:
    annotations:
      id: NOMINAL_LENGTH
      source: SRA.experiment
    title: Nominal length
    description: The average insert size for paired-end libraries.
    range: integer
    recommended: true
    ifabsent: int(300)
  locus_name:
    annotations:
      id: locus_name
      source: SRA.experiment
    title: Locus name
    description: The locus targeted for amplification (amplicon studies only).
    range: LocusNameMenu
    recommended: true
    ifabsent: string(16S rRNA)
  LIBRARY_CONSTRUCTION_PROTOCOL:
    annotations:
      id: LIBRARY_CONSTRUCTION_PROTOCOL
      source: SRA.experiment
    title: Library construction protocol
    description: Free form text describing the protocol by which the sequencing library
      was constructed. Alternatives for future runs include long-read 16S (ONT SQK-LSK114,
      MinION) or shotgun metagenomics / metatranscriptomics (Illumina Nextera XT).
    range: string
    recommended: true
    ifabsent: 'string(16S rRNA V4 amplicon; primers 515-YF and 806-BR; at EMBL Heidelberg)'
  fermenter_run_id:
    annotations:
      id: fermenter_run_id
      source: MIMICC.custom
    title: Fermenter run ID
    description: Identifier grouping all samples from one continuous culture run in
      a single physical fermenter vessel. Used to aggregate longitudinal data across
      timepoints.
    range: string
    required: true
    recommended: true
  fermenter_tank:
    annotations:
      id: fermenter_tank
      source: MIMICC.custom
    title: Fermenter tank
    description: Identifier for the specific tank within a multi-tank fermenter (e.g.
      A, B). Distinguishes parallel cultures sharing the same setup but running side-by-side.
    range: string
    required: true
    recommended: true
  dilution_rate:
    annotations:
      id: dilution_rate
      source: MIMICC.custom
    title: Dilution rate
    description: Continuous-culture dilution rate; the primary independent variable
      in dilution-rate titration experiments. Calculated as feed flow rate divided
      by working volume (D = F/V). A feed flow of 250 mL/24 h with a 200 mL working
      volume gives D = 0.052 h^-1.
    range: float
    required: true
    recommended: true
    ifabsent: float(0.052)
    comments:
    - 'Allowed units: h^-1'
  time_from_inoculation_h:
    annotations:
      id: time_from_inoculation_h
      source: MIMICC.custom
    title: Time from inoculation (h)
    description: Hours elapsed since SynCom inoculation. Enables longitudinal alignment
      across culture runs.
    range: float
    required: true
    recommended: true
    comments:
    - 'Allowed units: h'
  turbidity_OD600:
    annotations:
      id: turbidity_OD600
      source: MIMICC.custom
    title: Turbidity OD600
    description: Optical density at 600 nm measured at the time of sampling. Direct
      readout from the Multifors2 sensor.
    range: float
    required: false
    recommended: true
  redox_potential:
    annotations:
      id: redox_potential
      source: MIMICC.custom
    title: Redox potential
    description: Oxidation-reduction potential of the culture medium at the time of
      sampling, measured by the Multifors2 sensor. Typical steady-state values in
      anaerobic culture range from approximately -474 to -538 mV; values may range
      more widely from around -250 mV during early culture phases.
    range: float
    recommended: true
    comments:
    - 'Allowed units: mV'
  syncom_id:
    annotations:
      id: syncom_id
      source: MIMICC.custom
    title: SynCom ID
    description: Identifier for the synthetic community variant being cultured.
    range: string
    required: true
    recommended: true
    ifabsent: string(20HM)
    comments:
    - 'Examples: 20HM, 20HM+Pv-PC510, 20HM+M.smithii-DSM2374, 20HM+phage-ATCC-51477-B1'
  perturbation_type:
    annotations:
      id: perturbation_type
      source: MIMICC.custom
    title: Perturbation type
    description: Category of perturbation applied to the culture at or before sampling.
    range: PerturbationTypeMenu
    recommended: true
    ifabsent: string(none)
  perturbation_value:
    annotations:
      id: perturbation_value
      source: MIMICC.custom
    title: Perturbation value
    description: Magnitude or direction of the perturbation applied.
    range: string
    recommended: true
    comments:
    - 'Examples: +2C, -2C, phage ATCC 51477-B1'
  perturbation_start_time_h:
    annotations:
      id: perturbation_start_time_h
      source: MIMICC.custom
    title: Perturbation start time (h)
    description: Hours from inoculation when the perturbation began.
    range: float
    recommended: true
    comments:
    - 'Allowed units: h'
