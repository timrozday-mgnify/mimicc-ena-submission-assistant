id: https://github.com/timrozday/ena-submission-dataharmonizer/MIMICC_SampleExperiment
name: MIMICC_SampleExperiment
title: MIMICC Sample and Experiment Submission
description: >-
  Schema for MIMICC sample and experiment submission to ENA. Covers ERC000025 sample
  metadata, MIMICC-specific culture and perturbation attributes, and SRA experiment
  fields. Does not include run/read fields or full study metadata — link to an
  existing study via STUDY_REF.
version: 1.0.0
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  ENA: https://www.ebi.ac.uk/ena/browser/view/
default_range: string
classes:
  dh_interface:
    annotations:
      id: dh_interface
    description: A DataHarmonizer interface
    from_schema: https://github.com/timrozday/ena-submission-dataharmonizer/MIMICC_SampleExperiment
  MIMICC_SampleExperiment:
    annotations:
      id: MIMICC_SampleExperiment
    title: MIMICC sample and experiment submission
    description: >-
      Schema for MIMICC sample and experiment submission to ENA. Covers ERC000025 sample
      metadata, MIMICC-specific culture and perturbation attributes, and SRA experiment
      fields. Does not include run/read fields or full study metadata — link to an
      existing study via STUDY_REF.
    is_a: dh_interface
    slots:
    - alias
    - SAMPLE_TITLE
    - source_material_identifiers
    - TITLE
    - LIBRARY_NAME
    - collection_date
    - fermenter_run_id
    - fermenter_tank
    - time_from_inoculation_h
    - perturbation_type
    - perturbation_value
    - perturbation_start_time_h
    - turbidity_OD600
    - redox_potential
    - dilution_rate
    - temperature
    - ph
    - isolation_and_growth_condition
    - environmental_medium
    - syncom_id
    - amount_or_size_of_sample_collected
    - sample_collection_device
    - sample_collection_method
    - sample_material_processing
    - sample_storage_location
    - sample_storage_temperature
    - nucleic_acid_extraction
    - nucleic_acid_amplification
    - library_construction_method
    - pcr_conditions
    - pcr_primers
    - locus_name
    - sample_volume_or_weight_for_dna_extraction
    - library_size
    - adapters
    - LIBRARY_CONSTRUCTION_PROTOCOL
    - LIBRARY_LAYOUT
    - LIBRARY_SELECTION
    - LIBRARY_SOURCE
    - LIBRARY_STRATEGY
    - DESIGN_DESCRIPTION
    - NOMINAL_LENGTH
    - project_name
    - STUDY_REF
    - TAXON_ID
    - SCIENTIFIC_NAME
    - geographic_location_country_andor_sea
    - geographic_location_latitude
    - geographic_location_longitude
    - geographic_location_region_and_locality
    - broadscale_environmental_context
    - local_environmental_context
    - CENTER_NAME
    - COMMON_NAME
    - STRAIN
    - ISOLATE
    slot_usage:
      alias:
        rank: 1
        slot_group: Identifiers
      SAMPLE_TITLE:
        rank: 2
        slot_group: Identifiers
      source_material_identifiers:
        rank: 3
        slot_group: Identifiers
      TITLE:
        rank: 4
        slot_group: Identifiers
      LIBRARY_NAME:
        rank: 5
        slot_group: Identifiers
      collection_date:
        rank: 5
        slot_group: Experimental factors
      fermenter_run_id:
        rank: 6
        slot_group: Experimental factors
      fermenter_tank:
        rank: 7
        slot_group: Experimental factors
      time_from_inoculation_h:
        rank: 8
        slot_group: Experimental factors
      perturbation_type:
        rank: 9
        slot_group: Experimental factors
      perturbation_value:
        rank: 10
        slot_group: Experimental factors
      perturbation_start_time_h:
        rank: 11
        slot_group: Experimental factors
      turbidity_OD600:
        rank: 12
        slot_group: Experimental factors
      redox_potential:
        rank: 13
        slot_group: Experimental factors
      dilution_rate:
        rank: 14
        slot_group: Experimental factors
      temperature:
        rank: 15
        slot_group: Experimental factors
      ph:
        rank: 16
        slot_group: Experimental factors
      isolation_and_growth_condition:
        rank: 17
        slot_group: Experimental factors
      environmental_medium:
        rank: 18
        slot_group: Experimental factors
      syncom_id:
        rank: 19
        slot_group: Experimental factors
      amount_or_size_of_sample_collected:
        rank: 20
        slot_group: Sample collection
      sample_collection_device:
        rank: 21
        slot_group: Sample collection
      sample_collection_method:
        rank: 22
        slot_group: Sample collection
      sample_material_processing:
        rank: 23
        slot_group: Sample collection
      sample_storage_location:
        rank: 24
        slot_group: Sample collection
      sample_storage_temperature:
        rank: 25
        slot_group: Sample collection
      nucleic_acid_extraction:
        rank: 26
        slot_group: DNA extraction
      nucleic_acid_amplification:
        rank: 27
        slot_group: DNA extraction
      library_construction_method:
        rank: 28
        slot_group: DNA extraction
      pcr_conditions:
        rank: 29
        slot_group: DNA extraction
      pcr_primers:
        rank: 30
        slot_group: DNA extraction
      locus_name:
        rank: 31
        slot_group: DNA extraction
      sample_volume_or_weight_for_dna_extraction:
        rank: 32
