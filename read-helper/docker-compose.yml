services:
  read-helper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mimicc-read-helper
    # Bound to loopback only: not reachable from other machines. The browser
    # reaches it as http://localhost:<port> from the user's own machine.
    ports:
      - "127.0.0.1:${HELPER_PORT:-9100}:9100"
    volumes:
      # Spawn the enasequence/webin-cli sibling container.
      - /var/run/docker.sock:/var/run/docker.sock
      # Read-WRITE view of the host so the helper can read local read files and
      # write the webin-cli manifest beside them.
      - /:/hostroot
    environment:
      - HELPER_PORT=${HELPER_PORT:-9100}
      - HOST_HOME=${HOME}
      # Origin of the hosted MIMICC app that is allowed to drive this helper
      # (comma-separated). localhost is always allowed.
      - ALLOWED_ORIGINS=${MIMICC_APP_ORIGIN:-}
    restart: unless-stopped
