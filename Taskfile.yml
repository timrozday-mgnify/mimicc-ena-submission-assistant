version: "3"

# DOCKER_DEFAULT_PLATFORM=linux/amd64 is set globally in this user's shell
# (for other projects), but this project's docker-compose.yml pins
# platform: linux/arm64 per service so builds run natively on Apple Silicon
# instead of crashing under QEMU emulation. Compose refuses to start when the
# global env var conflicts with an explicit per-service platform, so every
# compose invocation here needs DOCKER_DEFAULT_PLATFORM unset. These tasks do
# that for you instead of requiring `env -u DOCKER_DEFAULT_PLATFORM ...` by hand.
tasks:
  up:
    desc: Start the stack, building images as needed
    cmds:
      - unset DOCKER_DEFAULT_PLATFORM && docker compose up --build {{.CLI_ARGS}}

  up:local:
    desc: Start the stack including the local-only read-helper profile
    cmds:
      - unset DOCKER_DEFAULT_PLATFORM && COMPOSE_PROFILES=local docker compose up --build {{.CLI_ARGS}}

  build:
    desc: Build images without starting containers
    cmds:
      - unset DOCKER_DEFAULT_PLATFORM && docker compose build {{.CLI_ARGS}}

  down:
    desc: Stop the stack
    cmds:
      - unset DOCKER_DEFAULT_PLATFORM && docker compose down {{.CLI_ARGS}}

  logs:
    desc: Tail logs for all (or a named) service
    cmds:
      - docker compose logs -f {{.CLI_ARGS}}

  rebuild:dh:
    desc: >
      Deep-rebuild mimicc-server and dhtb after editing ../DataHarmonizer or
      ../dataharmonizer-template-builder. Plain `task build`/`up --build` is NOT
      enough for changes to those sibling checkouts: (1) Docker's layer cache
      can skip the `COPY --from=dataharmonizer-src` step even when the source
      content changed, and (2) the built DH bundle is seeded into the
      mimicc-dh-bundle named volume only once, on first run — a fresh image
      alone never reaches a container that already has that volume populated.
      This forces a --no-cache image build and drops the stale volume so the
      next start re-seeds it from the new image.
    cmds:
      - unset DOCKER_DEFAULT_PLATFORM && docker compose build --no-cache mimicc-server dhtb
      - unset DOCKER_DEFAULT_PLATFORM && docker compose stop mimicc-server dhtb
      # rm releases the container's lock on the dh-bundle volume so it can be removed below
      - unset DOCKER_DEFAULT_PLATFORM && docker compose rm -f mimicc-server dhtb
      - |
        vol=$(docker volume ls -q --filter "name=mimicc-dh-bundle")
        if [ -n "$vol" ]; then docker volume rm $vol; fi
      - unset DOCKER_DEFAULT_PLATFORM && docker compose up -d mimicc-server dhtb {{.CLI_ARGS}}
